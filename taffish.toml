[package]
name = "rnaseq-expression-flow"
kind = "flow"
version = "0.1.0"
release = 1
license = "Apache-2.0"
main = "src/main.taf"

[repository]
url = "https://github.com/taffish/rnaseq-expression-flow"

[command]
name = "taf-rnaseq-expression-flow"

[runtime]
pipe = false
command_mode = false

[meta]
domain = "bio"
categories = ["rna-seq", "expression", "quantification", "workflow", "transcriptomics"]
keywords = ["rnaseq-expression-flow", "rna-seq", "salmon", "tximport", "fastq", "expression-matrix", "transcriptomics", "fastqc", "fastp", "multiqc"]
description = "TAFFISH RNA-seq expression flow for Salmon transcript quantification, tximport gene-level matrices, optional read QC, optional trimming, and MultiQC reporting."

[upstream]
name = "rnaseq-expression-flow"
type = "taffish-flow"
homepage = "https://github.com/taffish/rnaseq-expression-flow"
version = "0.1.0"
license = "Apache-2.0"
description = "TAFFISH-maintained Salmon-first RNA-seq expression flow composed from version-pinned TAFFISH tool apps."

[dependencies]
taf-fastqc = "0.12.1-r1"
taf-fastp = "1.3.3-r3"
taf-salmon = "1.11.4-r1"
taf-bioconductor-rnaseq = "3.23-r1"
taf-multiqc = "1.35-r2"
